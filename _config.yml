about_content: | # this will include new lines to allow paragraphs
  Hi, my name’s Mingyu Kim and I’m currently an undergraduate student in the Department of Computer Software Engineering at Hanyang University. I am working as an undergraduate research intern at the HYU NLP Lab, where I am actively participating in research projects. My current research focuses on multi-modal and retrieval, with a particular emphasis on Visual Document Retrieval (VDR). I am also broadly interested in large language models (LLMs), natural language processing (NLP), and their applications in finance. I am committed to learning with diligence and sincerity, and my long-term goal is to pursue a master’s and doctoral degree to conduct in-depth research in these areas.
